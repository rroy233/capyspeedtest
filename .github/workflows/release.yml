name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name || inputs.version }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || inputs.version }}
    strategy:
      matrix:
        include:
          - os: windows-2022
          - os: ubuntu-22.04
            linux_arch: x86_64
          - os: ubuntu-24.04-arm
            linux_arch: arm64
          - os: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate release version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$RELEASE_VERSION"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: $VERSION"
            echo "Expected semantic tag like v1.2.3 or v1.2.3-rc.1"
            exit 1
          fi

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS targets
        if: runner.os == 'macOS'
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev
          sudo apt-get install -y --no-install-recommends libsoup-3.0-dev \
            || sudo apt-get install -y --no-install-recommends libsoup2.4-dev

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install frontend deps
        run: bun install

      - name: Build Tauri App (Windows)
        if: runner.os == 'Windows'
        run: bunx tauri build

      - name: Build Tauri App (Linux)
        if: runner.os == 'Linux'
        run: bunx tauri build --bundles appimage,deb

      - name: Build Tauri App (macOS)
        if: runner.os == 'macOS'
        shell: bash
        env:
          MACOSX_DEPLOYMENT_TARGET: "12.0"
        run: |
          set -euxo pipefail
          bunx tauri build --target aarch64-apple-darwin
          bunx tauri build --target x86_64-apple-darwin

      - name: Prepare Windows Assets
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $VERSION = $env:RELEASE_VERSION
          $msi = Get-ChildItem -Path 'src-tauri/target/release/bundle/msi' -Recurse -Include *.msi -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -ne $msi) {
            $dest = "CapySpeedtest-$VERSION-Windows.msi"
            Copy-Item $msi.FullName (Join-Path release-assets $dest)
            Write-Host "Installer copied: $dest"
          } else {
            Write-Warning 'No Windows MSI installer found'
          }

      - name: Prepare Linux Assets
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p release-assets
          VERSION="$RELEASE_VERSION"
          ARCH="${{ matrix.linux_arch || 'x86_64' }}"
          APPIMAGE=$(find src-tauri/target/release/bundle -name "*.AppImage" | head -1 || true)
          if [ -n "$APPIMAGE" ]; then
            cp "$APPIMAGE" "release-assets/CapySpeedtest-${VERSION}-Linux-${ARCH}.AppImage"
            echo "AppImage copied"
          fi
          DEB=$(find src-tauri/target/release/bundle -name "*.deb" | head -1 || true)
          if [ -n "$DEB" ]; then
            cp "$DEB" "release-assets/CapySpeedtest-${VERSION}-Linux-${ARCH}.deb"
            echo "Deb package copied"
          fi

      - name: Prepare macOS Assets
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p release-assets
          VERSION="$RELEASE_VERSION"

          ARM_APP=$(find "src-tauri/target/aarch64-apple-darwin/release/bundle/macos" -maxdepth 1 -name "*.app" -type d | head -1 || true)
          if [ -n "$ARM_APP" ]; then
            ARM_ZIP="CapySpeedtest-${VERSION}-macOS-AppleSilicon.zip"
            ditto -c -k --sequesterRsrc --keepParent "$ARM_APP" "release-assets/$ARM_ZIP"
            echo "macOS Apple Silicon zip ready: $ARM_ZIP"
          else
            echo "No Apple Silicon .app found"
          fi

          INTEL_APP=$(find "src-tauri/target/x86_64-apple-darwin/release/bundle/macos" -maxdepth 1 -name "*.app" -type d | head -1 || true)
          if [ -n "$INTEL_APP" ]; then
            INTEL_ZIP="CapySpeedtest-${VERSION}-macOS-Intel.zip"
            ditto -c -k --sequesterRsrc --keepParent "$INTEL_APP" "release-assets/$INTEL_ZIP"
            echo "macOS Intel zip ready: $INTEL_ZIP"
          else
            echo "No Intel .app found"
          fi

      - name: List prepared assets
        shell: bash
        run: |
          ls -la release-assets || true

      - name: Upload release artifacts to workflow
        uses: actions/upload-artifact@v7
        with:
          name: release-assets-${{ runner.os }}-${{ matrix.arch || runner.arch }}
          path: release-assets/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs: release
    env:
      RELEASE_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || inputs.version }}
    permissions:
      contents: write
    steps:
      - name: Checkout full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate release version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$RELEASE_VERSION"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: $VERSION"
            echo "Expected semantic tag like v1.2.3 or v1.2.3-rc.1"
            exit 1
          fi

      - name: Download built release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-assets-*
          path: release-assets
          merge-multiple: true

      - name: List downloaded release artifacts
        shell: bash
        run: |
          ls -la release-assets

      - name: Generate release notes
        id: release_notes
        shell: bash
        run: |
          set -euo pipefail

          TAG="$RELEASE_VERSION"
          REPO_URL="https://github.com/${GITHUB_REPOSITORY}"
          git fetch --tags --force

          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            PREV_TAG=$(git tag --sort=-version:refname | grep -Fxv "$TAG" | head -n1 || true)
            RANGE="${PREV_TAG:+${PREV_TAG}..}${TAG}"
            COMPARE_TARGET="$TAG"
          else
            PREV_TAG=$(git tag --sort=-version:refname | head -n1 || true)
            RANGE="${PREV_TAG:+${PREV_TAG}..}HEAD"
            COMPARE_TARGET="HEAD"
          fi

          TMP_COMMITS=$(mktemp)
          if [ -n "${RANGE}" ]; then
            git log --pretty=format:'%s|%h|%an' "${RANGE}" > "$TMP_COMMITS" || true
          fi

          declare -a FEAT FIX PERF REFACTOR DOCS TEST BUILD CI CHORE OTHER
          while IFS='|' read -r SUBJECT SHA AUTHOR; do
            [ -z "${SHA:-}" ] && continue
            ENTRY="- ${SUBJECT} ([${SHA}](${REPO_URL}/commit/${SHA})) - ${AUTHOR}"
            LOWER_SUBJECT=$(printf '%s' "$SUBJECT" | tr '[:upper:]' '[:lower:]')
            case "$LOWER_SUBJECT" in
              feat:*|feature:*) FEAT+=("$ENTRY") ;;
              fix:*) FIX+=("$ENTRY") ;;
              perf:*) PERF+=("$ENTRY") ;;
              refactor:*) REFACTOR+=("$ENTRY") ;;
              docs:*) DOCS+=("$ENTRY") ;;
              test:*) TEST+=("$ENTRY") ;;
              build:*) BUILD+=("$ENTRY") ;;
              ci:*) CI+=("$ENTRY") ;;
              chore:*) CHORE+=("$ENTRY") ;;
              *) OTHER+=("$ENTRY") ;;
            esac
          done < "$TMP_COMMITS"

          append_section() {
            local title="$1"
            shift
            local -a items=("$@")
            [ "${#items[@]}" -eq 0 ] && return 0
            {
              echo "## ${title}"
              echo
              printf '%s\n' "${items[@]}"
              echo
            } >> release-notes.md
          }

          {
            echo "# CapySpeedtest ${TAG}"
            echo
            echo "自动生成的变更说明（按提交类型分类）。"
            echo
            if [ -n "${PREV_TAG}" ]; then
              echo "- 对比范围: \`${PREV_TAG} -> ${TAG}\`"
              echo "- 对比链接: [${PREV_TAG}...${COMPARE_TARGET}](${REPO_URL}/compare/${PREV_TAG}...${COMPARE_TARGET})"
            else
              echo "- 对比范围: 仓库起点 -> ${TAG}"
            fi
            echo
            echo "## 下载"
            echo
            echo "- macOS (Apple Silicon): \`CapySpeedtest-${TAG}-macOS-AppleSilicon.zip\`"
            echo "- macOS (Intel): \`CapySpeedtest-${TAG}-macOS-Intel.zip\`"
            echo "- Windows: \`CapySpeedtest-${TAG}-Windows.msi\`"
            echo "- Linux x86_64: \`CapySpeedtest-${TAG}-Linux-x86_64.AppImage\` / \`CapySpeedtest-${TAG}-Linux-x86_64.deb\`"
            echo "- Linux arm64: \`CapySpeedtest-${TAG}-Linux-arm64.AppImage\` / \`CapySpeedtest-${TAG}-Linux-arm64.deb\`"
            echo
          } > release-notes.md

          append_section "Features" "${FEAT[@]}"
          append_section "Fixes" "${FIX[@]}"
          append_section "Performance" "${PERF[@]}"
          append_section "Refactors" "${REFACTOR[@]}"
          append_section "Documentation" "${DOCS[@]}"
          append_section "Tests" "${TEST[@]}"
          append_section "Build" "${BUILD[@]}"
          append_section "CI" "${CI[@]}"
          append_section "Chore" "${CHORE[@]}"
          append_section "Other Changes" "${OTHER[@]}"

          if [ ! -s "$TMP_COMMITS" ]; then
            {
              echo "## Changes"
              echo
              echo "- No code changes found in the selected range."
              echo
            } >> release-notes.md
          fi

          echo "Generated release-notes.md:"
          cat release-notes.md

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          name: CapySpeedtest ${{ env.RELEASE_VERSION }}
          prerelease: true
          body_path: release-notes.md
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
