name: "🐛 Bug Report / Bug 报告"
description: |
  Report errors or unexpected behavior.
  报告错误或异常行为。
labels:
  - bug
body:
  - type: checkboxes
    attributes:
      label: Self Checks / 自检
      options:
        - label: |
            I have searched for [existing issues](https://github.com/rroy233/capyspeedtest/issues), including closed ones.
            我已搜索过[已有的 Issue](https://github.com/rroy233/capyspeedtest/issues)，包括已关闭的。
          required: true

  - type: input
    attributes:
      label: CapySpeedtest Version / 版本号
      description: |
        See the app window title or Settings page.
        查看应用窗口标题或设置页面。
      placeholder: "e.g. 0.1.0"
    validations:
      required: true

  - type: dropdown
    attributes:
      label: Operating System / 操作系统
      multiple: false
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps to Reproduce / 重现步骤
      description: |
        Please describe the steps to reproduce the bug. Screenshots and logs are helpful.
        请描述重现步骤。截图和日志会很有帮助。
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    attributes:
      label: Expected Behavior / 期望行为
      description: |
        What did you expect to happen?
        你期望发生什么？
    validations:
      required: true

  - type: textarea
    attributes:
      label: Actual Behavior / 实际行为
      description: |
        What actually happened?
        实际发生了什么？
    validations:
      required: false

  - type: textarea
    attributes:
      label: Additional Context / 补充信息
      description: |
        Any other information, screenshots, or logs.
        其他信息、截图或日志。
    validations:
      required: false
